name: agent-ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Agent
        run: make validate-agent

      - name: Eval Routing
        run: make eval-routing

      - name: Eval Groundedness
        run: make eval-groundedness

      - name: Eval Task Success
        run: make eval-task-success

      - name: Smoke Lite
        run: make smoke-lite
